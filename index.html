const map = L.map('map', { center: [20, 0], zoom: 2, attributionControl: false });
setTimeout(() => map.invalidateSize(), 300);
window.addEventListener('load', () => setTimeout(() => map.invalidateSize(), 100));

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

const info = document.getElementById('info');

let geojsonLayer;

function getStyle() {
  return { fillColor: '#378ADD', weight: 0.5, opacity: 1, color: '#fff', fillOpacity: 0.4 };
}

function onMouseOver(e) {
  e.target.setStyle({ fillOpacity: 0.75, weight: 1.5 });
  const name = e.target.feature.properties.name || '';
  const d = countries[name];
  if (d) {
    const pop = d.pop >= 1 ? d.pop + ' млн' : (d.pop * 1000).toFixed(0) + ' тыс';
    info.innerHTML = `
      <div class="country-name">${name}</div>
      <div>🏛 ${d.capital}</div>
      <div>👥 ${pop} человек</div>
      <div>🗣 ${d.lang}</div>
    `;
  } else {
    info.innerHTML = `<div class="country-name">${name}</div>`;
  }
}

function onMouseOut(e) {
  geojsonLayer.resetStyle(e.target);
  info.textContent = 'Наведите на страну';
}

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const geojson = topojson.feature(world, world.objects.countries);
    geojsonLayer = L.geoJSON(geojson, {
      style: getStyle,
      onEachFeature: (feature, layer) => {
        layer.on({ mouseover: onMouseOver, mouseout: onMouseOut });
      }
    }).addTo(map);
  });
